<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneySplit-Expense Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary: #005696;
            --secondary: #10ac84;
            --danger: #ee5253;
            --warning: #ff9f43;
            --bg: #f4f7fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-light: #636e72;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .header { display: flex; align-items: center; justify-content: center; background: var(--card-bg); padding: 15px 30px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 25px; position: relative; }
        .app-title { font-size: 22px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        
        .btn-reset { background: var(--danger); color: white; width: auto; padding: 8px 15px; font-size: 12px; position: absolute; right: 30px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid #f0f0f0; position: relative; }
        
        h2 { font-size: 18px; color: var(--primary); margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 15px; }
        
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-light); text-transform: uppercase; text-align: center; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: 0.2s; text-transform: uppercase; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        
        .btn-primary, .btn-secondary { background: var(--primary); color: white; }
        .btn-primary:hover, .btn-secondary:hover { background: #00447a; }
        
        /* Fixed: PDF button positioning to prevent overlap */
        .btn-pdf { background: #e8f4fd; color: var(--primary); border: 1px solid var(--primary); width: auto; padding: 8px 15px; font-size: 12px; position: absolute; right: 25px; top: 18px; text-transform: uppercase; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-pdf:hover { background: var(--primary); color: white; }
        
        /* Fixed: Settlement Plan section spacing */
        #settlementPlan { margin-top: 25px; }

        .buddy-tag { display: inline-flex; align-items: center; background: #e1f5fe; padding: 6px 12px; border-radius: 20px; margin: 4px; font-size: 13px; font-weight: 500; text-transform: uppercase; }
        .remove-buddy { margin-left: 8px; color: var(--danger); cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        
        th { text-align: center; font-size: 11px; color: var(--text-light); padding: 12px; border-bottom: 2px solid #f1f2f6; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f1f2f6; font-size: 13px; text-transform: uppercase; text-align: center; }
        
        .stat-box { background: #f8fafc; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; }
        .settlement-card { background: #fff9db; border: 1px solid #f5e79e; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; text-transform: uppercase; }
        .amt-pill { align-self: flex-end; background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; margin-top: 5px; }
        .negative { color: var(--danger); font-weight: bold; }
        .positive { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="app-title">MoneySplit</div>
        <button class="btn-reset" onclick="resetAll()">Reset Data</button>
    </div>
    <div class="layout">
        <div class="side">
            <div class="card">
                <h2>👤 Buddy Names</h2>
                <div class="input-group">
                    <label>Enter Name</label>
                    <input type="text" id="buddyInput" placeholder="Enter name" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')" onkeypress="if(event.key==='Enter')addBuddy()">
                    <button class="btn btn-secondary" style="margin-top:10px;" onclick="addBuddy()">Add to Group</button>
                </div>
                <div id="buddyList"></div>
            </div>
            <div class="card">
                <h2>📊 Live Balances</h2>
                <div id="balanceTableContainer"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                    <div class="stat-box"><span class="stat-label">Total Group</span><span id="totalText" class="stat-val">₹0</span></div>
                    <div class="stat-box"><span class="stat-label">Per Buddy</span><span id="perHeadText" class="stat-val">₹0</span></div>
                </div>
            </div>
            <div class="card">
                <h2>🤝 Settlement Plan</h2>
                <button class="btn-pdf" onclick="exportPDF()">PDF</button>
                <div id="settlementPlan"></div>
            </div>
        </div>
        <div class="main">
            <div class="card">
                <h2>💸 Record Expense</h2>
                <div style="display:grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap:12px;">
                    <div class="input-group"><label>Date</label><input type="date" id="expDate"></div>
                    <div class="input-group"><label>Item</label><input type="text" id="expDesc" placeholder="e.g. Lunch" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')"></div>
                    <div class="input-group"><label>Amount (₹)</label><input type="text" id="expAmt" placeholder="0.00" oninput="this.value = this.value.replace(/[^0-9.]/g, '')"></div>
                    <div class="input-group"><label>Paid By</label><select id="expPayer"></select></div>
                </div>
                <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
            </div>
            <div class="card">
                <h2>📝 History</h2>
                <table>
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Date</th>
                            <th>Item</th>
                            <th>Name</th>
                            <th>Amount</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="expHistory"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    let buddies = JSON.parse(localStorage.getItem('ms_buddies')) || []; 
    let expenses = JSON.parse(localStorage.getItem('ms_expenses')) || [];
    document.getElementById('expDate').valueAsDate = new Date();

    function formatDate(dateStr) {
        if (!dateStr) return "";
        const date = new Date(dateStr);
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return `${d}-${m}-${y}`;
    }

    function addBuddy() {
        const input = document.getElementById('buddyInput'); 
        const name = input.value.trim().toUpperCase();
        if (name && !buddies.includes(name)) { 
            buddies.push(name); 
            input.value = ''; 
            saveAndUI(); 
        }
    }

    function removeBuddy(idx) {
        if(confirm('REMOVE THIS BUDDY AND THEIR EXPENSES?')) {
            const name = buddies[idx]; buddies.splice(idx, 1);
            expenses = expenses.filter(e => e.payer !== name); saveAndUI();
        }
    }

    function addExpense() {
        const date = document.getElementById('expDate').value;
        const d = document.getElementById('expDesc').value.toUpperCase(); 
        const a = parseFloat(document.getElementById('expAmt').value);
        const p = document.getElementById('expPayer').value.toUpperCase();
        if(date && d && a > 0 && p) {
            expenses.push({ id: Date.now(), date: date, desc: d, amt: a, payer: p });
            document.getElementById('expDesc').value = ''; 
            document.getElementById('expAmt').value = ''; 
            saveAndUI();
        } else { alert('PLEASE FILL ALL FIELDS CORRECTLY.'); }
    }

    function delExpense(id) { expenses = expenses.filter(e => e.id !== id); saveAndUI(); }

    function saveAndUI() {
        localStorage.setItem('ms_buddies', JSON.stringify(buddies));
        localStorage.setItem('ms_expenses', JSON.stringify(expenses));
        updateUI();
    }

    function updateUI() {
        document.getElementById('buddyList').innerHTML = buddies.map((b, i) => `<div class="buddy-tag">${b}<span class="remove-buddy" onclick="removeBuddy(${i})">×</span></div>`).join('');
        const sel = document.getElementById('expPayer');
        sel.innerHTML = '<option value="" disabled selected>SELECT</option>' + buddies.map(b => `<option value="${b}">${b}</option>`).join('');
        document.getElementById('expHistory').innerHTML = expenses.map((e, index) => `
            <tr>
                <td>${index + 1}</td>
                <td>${formatDate(e.date)}</td>
                <td>${e.desc}</td>
                <td>${e.payer}</td>
                <td>₹${e.amt.toFixed(2)}</td>
                <td style="text-align:right;"><span class="remove-buddy" onclick="delExpense(${e.id})">×</span></td>
            </tr>
        `).join('');
        calculate();
    }

    function calculate() {
        const total = expenses.reduce((s, e) => s + e.amt, 0); const perHead = buddies.length ? total / buddies.length : 0;
        document.getElementById('totalText').innerText = '₹' + total.toFixed(0); document.getElementById('perHeadText').innerText = '₹' + perHead.toFixed(0);
        const summary = buddies.map(b => {
            const paid = expenses.filter(e => e.payer === b).reduce((s, e) => s + e.amt, 0);
            return { name: b, net: paid - perHead };
        });
        let bHtml = '<table>';
        summary.forEach(s => { bHtml += `<tr><td>${s.name}</td><td class="${s.net >= 0 ? 'positive' : 'negative'}">${s.net >= 0 ? '+' : ''}₹${s.net.toFixed(2)}</td></tr>`; });
        document.getElementById('balanceTableContainer').innerHTML = bHtml + '</table>';
        let debtors = summary.filter(s => s.net < -0.01).sort((a,b) => a.net - b.net);
        let creditors = summary.filter(s => s.net > 0.01).sort((a,b) => b.net - a.net);
        let sHtml = ''; let i = 0, j = 0;
        while(i < debtors.length && j < creditors.length) {
            let pay = Math.min(Math.abs(debtors[i].net), creditors[j].net);
            sHtml += `<div class="settlement-card"><span><b>${debtors[i].name}</b> PAYS <b>${creditors[j].name}</b></span><span class="amt-pill">₹${pay.toFixed(2)}</span></div>`;
            debtors[i].net += pay; creditors[j].net -= pay;
            if(Math.abs(debtors[i].net) < 0.01) i++;
            if(Math.abs(creditors[j].net) < 0.01) j++;
        }
        document.getElementById('settlementPlan').innerHTML = sHtml || '<p style="color:#999;font-style:italic">NO SETTLEMENTS NEEDED</p>';
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date();
        const dateStr = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()}`;

        doc.setFontSize(18);
        doc.text("MONEYSPLIT SETTLEMENT REPORT", 105, 20, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`GENERATED ON: ${dateStr}`, 105, 28, { align: 'center' });

        doc.setFontSize(14);
        doc.text("EXPENSE DETAILS", 14, 40);
        const tableData = expenses.map((e, i) => [i + 1, formatDate(e.date), e.desc.toUpperCase(), e.payer.toUpperCase(), `RS. ${e.amt.toFixed(2)}`]);
        doc.autoTable({
            startY: 45,
            head: [['S.NO', 'DATE', 'ITEM', 'NAME', 'AMOUNT']],
            body: tableData,
            styles: { cellPadding: 3, fontSize: 9, valign: 'middle', halign: 'center' },
            headStyles: { fillColor: [0, 86, 150] },
        });

        const finalY = doc.lastAutoTable.finalY + 15;
        doc.text("SETTLEMENT PLAN", 14, finalY);
        
        let settleData = [];
        const total = expenses.reduce((s, e) => s + e.amt, 0);
        const perHead = buddies.length ? total / buddies.length : 0;
        const summary = buddies.map(b => {
            const paid = expenses.filter(e => e.payer === b).reduce((s, e) => s + e.amt, 0);
            return { name: b, net: paid - perHead };
        });
        let debtors = summary.filter(s => s.net < -0.01).sort((a,b) => a.net - b.net);
        let creditors = summary.filter(s => s.net > 0.01).sort((a,b) => b.net - a.net);
        let i = 0, j = 0;
        while(i < debtors.length && j < creditors.length) {
            let pay = Math.min(Math.abs(debtors[i].net), creditors[j].net);
            settleData.push([debtors[i].name.toUpperCase(), creditors[j].name.toUpperCase(), `RS. ${pay.toFixed(2)}`]);
            debtors[i].net += pay; creditors[j].net -= pay;
            if(Math.abs(debtors[i].net) < 0.01) i++;
            if(Math.abs(creditors[j].net) < 0.01) j++;
        }

        if (settleData.length > 0) {
            doc.autoTable({
                startY: finalY + 5,
                head: [['FROM', 'TO', 'AMOUNT']],
                body: settleData,
                styles: { cellPadding: 3, fontSize: 9, halign: 'center' },
                headStyles: { fillColor: [16, 172, 132] },
            });
        } else {
            doc.text("ALL BALANCES SETTLED. NO PAYMENTS REQUIRED.", 14, finalY + 10);
        }

        doc.save(`MONEYSPLIT_REPORT_${dateStr}.pdf`);
    }

    function resetAll() { if(confirm('ARE YOU SURE YOU WANT TO CLEAR ALL DATA? THIS ACTION CANNOT BE UNDONE.')) { buddies = []; expenses = []; saveAndUI(); } }
    
    updateUI();
</script>
</body>
</html>
