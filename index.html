<footer>
    <div class="visitor-counter">
        <span>VISITORS:</span>
        <span id="visit-count">Loading...</span>
    </div>
</footer>

<script>
    // Existing loadView function
    function loadView(view) {
        const frame = document.getElementById('app-frame');
        const home = document.getElementById('home-view');
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if(item.innerText.toLowerCase().includes(view.toLowerCase())) item.classList.add('active');
        });

        if (view === 'home') {
            frame.style.display = 'none';
            home.style.display = 'block';
        } else {
            home.style.display = 'none';
            frame.style.display = 'block';
            frame.src = view + '.html';
        }
    }

    // NEW: Robust Visitor Counter Script
    // This uses CountAPI to increment and fetch hits without an image
    function updateCounter() {
        const countElement = document.getElementById('visit-count');
        const namespace = "multiassist-digital-suite"; // Unique ID for your app
        const key = "homepage-visits";

        fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
            .then(res => res.json())
            .then(data => {
                countElement.innerText = data.value.toLocaleString();
            })
            .catch(err => {
                console.error("Counter error:", err);
                countElement.innerText = "Unavailable";
            });
    }

    // Call the counter on page load
    window.onload = updateCounter;
</script>
